plugins {
    id 'com.android.application'
}

android {
    namespace 'com.wails.app'
    compileSdk 35

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        applicationId "com.wails.app"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0"

        // Physical devices are arm64-v8a. x86_64 is only needed for the Android
        // Emulator, so it's restricted to debug builds (see buildTypes) to keep
        // release/device APKs from shipping the redundant native library.
        ndk {
            abiFilters 'arm64-v8a'
        }
    }

    def keystoreFile = System.getenv("ANDROID_KEYSTORE_FILE")
    def hasKeystore = keystoreFile != null && !keystoreFile.trim().isEmpty()

    signingConfigs {
        // A real keystore can be provided via environment variables; without
        // one, release builds are signed with the debug keystore so they can
        // be installed for testing (not suitable for Play Store uploads).
        release {
            if (hasKeystore) {
                storeFile file(keystoreFile)
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEY_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig hasKeystore ? signingConfigs.release : signingConfigs.debug
        }
        debug {
            debuggable true
            // x86_64 kept here so the app still runs in the Android Emulator;
            // release builds drop it (inherited from defaultConfig above).
            ndk {
                abiFilters 'arm64-v8a', 'x86_64'
            }
            // Keep Go debug symbols only for debug builds so the emulator
            // .so is debuggable; release builds are stripped (Go -w -s + NDK).
            packagingOptions {
                doNotStrip '*/arm64-v8a/libwails.so'
                doNotStrip '*/x86_64/libwails.so'
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    // Source sets configuration
    sourceSets {
        main {
            // JNI libraries are in jniLibs folder
            jniLibs.srcDirs = ['src/main/jniLibs']
            // Assets for the WebView
            assets.srcDirs = ['src/main/assets']
        }
    }

    // (doNotStrip is now scoped to the debug buildType above so release
    // native libraries are stripped for smaller APKs.)
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.webkit:webkit:1.9.0'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.biometric:biometric:1.1.0'
    implementation 'androidx.security:security-crypto:1.1.0-alpha06'
    implementation 'androidx.browser:browser:1.7.0'
}
