name: Build & Release APK

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build web app
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/debug/app-debug.apk
          echo "APK built successfully"

      - name: Resolve tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            RAW_TAG="${{ github.event.release.tag_name }}"
          else
            RAW_TAG="${GITHUB_REF#refs/tags/}"
          fi
          CLEAN_TAG="${RAW_TAG#v}"
          echo "RAW_TAG=${RAW_TAG}" >> $GITHUB_OUTPUT
          echo "TAG=${CLEAN_TAG}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk miku-v${{ steps.version.outputs.TAG }}-debug.apk
          ls -la miku-v${{ steps.version.outputs.TAG }}-debug.apk

      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.RAW_TAG }}" \
            "miku-v${{ steps.version.outputs.TAG }}-debug.apk" \
            --clobber
