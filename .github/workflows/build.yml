name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '22'
  JAVA_VERSION: '17'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-35 build-tools;35.0.0 ndk;26.3.11579264

      - name: Install system dependencies
        run: |
          sudo apt-get update

          PKGS="pkg-config build-essential libgtk-3-dev libsoup-3.0-dev"
          CANDIDATE=$(apt-cache search --names-only '^libwebkit2gtk-.*-dev$' | awk '{print $1}' | sort -V | tail -n1 || true)

          if [ -n "$CANDIDATE" ]; then
            echo "Installing $CANDIDATE along with base packages"
            sudo apt-get install -y $PKGS "$CANDIDATE"
          else
            echo "No suitable libwebkit2gtk dev package found."
            exit 1
          fi

      - name: Install Wails CLI
        run: |
          GOFLAGS=-tags=gtk3 go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.117
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Create build environment file
        run: |
          if [ -z "$ANILIST_CLIENT_ID" ] || [ -z "$ANILIST_CLIENT_SECRET" ]; then
            echo "ANILIST_CLIENT_ID and ANILIST_CLIENT_SECRET GitHub secrets are required for OAuth builds." >&2
            exit 1
          fi
          {
            printf 'ANILIST_CLIENT_ID=%s\n' "$ANILIST_CLIENT_ID"
            printf 'ANILIST_CLIENT_SECRET=%s\n' "$ANILIST_CLIENT_SECRET"
          } > .env
        env:
          ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
          ANILIST_CLIENT_SECRET: ${{ secrets.ANILIST_CLIENT_SECRET }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
          cd ..

      - name: Generate Wails bindings
        run: GOFLAGS=-tags=gtk3 wails3 generate bindings

      - name: Build Android APK
        run: wails3 task android:package:fat
        env:
          ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
          ANILIST_CLIENT_SECRET: ${{ secrets.ANILIST_CLIENT_SECRET }}

      - name: Find APK file
        id: find-apk
        run: |
          APK_PATH=$(find bin build/android -name "*.apk" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "APK not found" >&2
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "Found APK: $APK_PATH"

      - name: Get version and branch info
        id: version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          BRANCH="${BRANCH#refs/tags/}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            IS_TAG="true"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
            IS_TAG="false"
          fi

          # Check if this is main or develop
          if [[ "$BRANCH" == "main" ]] || [[ "$BRANCH" == "refs/heads/main" ]]; then
            IS_STABLE="true"
          else
            IS_STABLE="false"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "is_tag=$IS_TAG" >> $GITHUB_OUTPUT
          echo "is_stable=$IS_STABLE" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Branch: $BRANCH, Is Tag: $IS_TAG, Is Stable: $IS_STABLE"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: miku-${{ steps.version.outputs.version }}
          path: ${{ steps.find-apk.outputs.apk_path }}
          retention-days: 30

      # Pre-release from develop branch tags
      - name: Create Pre-release (develop)
        if: steps.version.outputs.is_tag == 'true' && steps.version.outputs.is_stable == 'false'
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          APK_PATH="${{ steps.find-apk.outputs.apk_path }}"
          APK_NAME="Miku-${TAG_NAME}-beta.apk"

          # Rename APK to include version and beta suffix
          mv "$APK_PATH" "$(dirname "$APK_PATH")/$APK_NAME"

          gh release create "$TAG_NAME" \
            --title "Miku $TAG_NAME (Beta)" \
            --generate-notes \
            --prerelease \
            "$(dirname "$APK_PATH")/$APK_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Stable release from main branch tags
      - name: Create Stable Release (main)
        if: steps.version.outputs.is_tag == 'true' && steps.version.outputs.is_stable == 'true'
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          APK_PATH="${{ steps.find-apk.outputs.apk_path }}"
          APK_NAME="Miku-${TAG_NAME}.apk"

          # Rename APK to include version
          mv "$APK_PATH" "$(dirname "$APK_PATH")/$APK_NAME"

          gh release create "$TAG_NAME" \
            --title "Miku $TAG_NAME" \
            --generate-notes \
            "$(dirname "$APK_PATH")/$APK_NAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate:
    name: Validate Code
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update

          PKGS="pkg-config build-essential libgtk-3-dev libsoup-3.0-dev"
          CANDIDATE=$(apt-cache search --names-only '^libwebkit2gtk-.*-dev$' | awk '{print $1}' | sort -V | tail -n1 || true)

          if [ -n "$CANDIDATE" ]; then
            echo "Installing $CANDIDATE along with base packages"
            sudo apt-get install -y $PKGS "$CANDIDATE"
          else
            echo "No suitable libwebkit2gtk dev package found."
            exit 1
          fi

      - name: Install Wails CLI
        run: GOFLAGS=-tags=gtk3 go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.117

      - name: Create validation environment file
        run: |
          if [ -z "$ANILIST_CLIENT_ID" ] || [ -z "$ANILIST_CLIENT_SECRET" ]; then
            echo "ANILIST_CLIENT_ID and ANILIST_CLIENT_SECRET GitHub secrets are required for validation." >&2
            exit 1
          fi
          {
            printf 'ANILIST_CLIENT_ID=%s\n' "$ANILIST_CLIENT_ID"
            printf 'ANILIST_CLIENT_SECRET=%s\n' "$ANILIST_CLIENT_SECRET"
          } > .env
        env:
          ANILIST_CLIENT_ID: ${{ secrets.ANILIST_CLIENT_ID }}
          ANILIST_CLIENT_SECRET: ${{ secrets.ANILIST_CLIENT_SECRET }}

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
          cd ..

      - name: Generate Wails bindings
        run: GOFLAGS=-tags=gtk3 wails3 generate bindings

      - name: Build frontend (required for go vet embed)
        run: |
          cd frontend
          npm run build
          cd ..

      - name: Validate Go code
        run: |
          go vet -tags gtk3 ./...
          echo "Go validation passed"
