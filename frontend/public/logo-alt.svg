<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Soft pink gradient -->
    <linearGradient id="pinkSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    
    <!-- Background gradient -->
    <radialGradient id="bgDeep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#0d0815"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgDeep)"/>
  
  <!-- Thin circle outline -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#2d2040" stroke-width="1.5"/>
  
  <!-- Handwritten style M -->
  <g transform="translate(256, 260)">
    <path d="M-80 60 L-80 -50 Q-80 -65, -65 -65 L-55 -65 Q-40 -65, -40 -50 L-40 0 L0 -65 L20 -65 L65 0 L65 -65 Q65 -65, 80 -65 L80 -50 Q80 60, 80 60" 
          fill="none" 
          stroke="#f8fafc" 
          stroke-width="4" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          transform="rotate(-3)"/>
  </g>

  <!-- Cherry blossom - delicate -->
  <g transform="translate(345, 175)">
    <!-- Stem -->
    <path d="M0 20 Q-8 35 -12 50" fill="none" stroke="#7c3aed" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
    
    <!-- Petals - teardrop shapes -->
    <g transform="rotate(-10)">
      <path d="M0,-18 Q6,-12 5,-4 Q4,4 0,7 Q-4,4 -5,-4 Q-6,-12 0,-18" 
            fill="url(#pinkSoft)" opacity="0.9"/>
      <path d="M0,-18 Q6,-12 5,-4 Q4,4 0,7 Q-4,4 -5,-4 Q-6,-12 0,-18" 
            fill="url(#pinkSoft)" opacity="0.85" transform="rotate(72)"/>
      <path d="M0,-18 Q6,-12 5,-4 Q4,4 0,7 Q-4,4 -5,-4 Q-6,-12 0,-18" 
            fill="url(#pinkSoft)" opacity="0.8" transform="rotate(144)"/>
      <path d="M0,-18 Q6,-12 5,-4 Q4,4 0,7 Q-4,4 -5,-4 Q-6,-12 0,-18" 
            fill="url(#pinkSoft)" opacity="0.8" transform="rotate(216)"/>
      <path d="M0,-18 Q6,-12 5,-4 Q4,4 0,7 Q-4,4 -5,-4 Q-6,-12 0,-18" 
            fill="url(#pinkSoft)" opacity="0.75" transform="rotate(288)"/>
    </g>
    
    <!-- Center -->
    <circle cx="0" cy="0" r="4" fill="#fbbf24" opacity="0.9"/>
  </g>
  
  <!-- Tiny floating petal -->
  <ellipse cx="370" cy="260" rx="4" ry="7" fill="#fda4af" opacity="0.3" transform="rotate(40, 370, 260)"/>
</svg>