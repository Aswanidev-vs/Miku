<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Purple gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    
    <!-- Pink accent -->
    <linearGradient id="pinkAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0a0a12"/>
  
  <!-- Modern M - geometric, clean lines -->
  <g transform="translate(256, 250)">
    <!-- M made of clean geometric strokes -->
    <path d="M-100 80 L-100 -80 L-40 0 L20 -80 L80 0 L80 -80" 
          fill="none" 
          stroke="url(#purpleGrad)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- Minimal cherry blossom - just petals, no circle -->
  <g transform="translate(380, 130)">
    <circle cx="0" cy="0" r="3" fill="#fbbf24"/>
    <circle cx="12" cy="-4" r="8" fill="url(#pinkAccent)" opacity="0.8"/>
    <circle cx="4" cy="10" r="8" fill="url(#pinkAccent)" opacity="0.75"/>
    <circle cx="-10" cy="4" r="8" fill="url(#pinkAccent)" opacity="0.7"/>
    <circle cx="-4" cy="-10" r="8" fill="url(#pinkAccent)" opacity="0.75"/>
    <circle cx="10" cy="8" r="8" fill="url(#pinkAccent)" opacity="0.65"/>
  </g>
  
  <!-- Subtle dot accent -->
  <circle cx="350" cy="200" r="2" fill="#c084fc" opacity="0.4"/>
</svg>