<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="softPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fecdd3"/>
      <stop offset="100%" stop-color="#fda4af"/>
    </linearGradient>
  </defs>

  <!-- Pure black background -->
  <rect width="512" height="512" rx="96" fill="#000000"/>
  
  <!-- Ultra-minimal M - single stroke, elegant -->
  <path d="M140 380 L140 160 L210 280 L280 160 L280 380" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="6" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        transform="translate(55, -20)"/>

  <!-- Single cherry blossom petal cluster - very subtle -->
  <g transform="translate(370, 140)">
    <ellipse cx="0" cy="-8" rx="5" ry="10" fill="url(#softPink)" opacity="0.7" transform="rotate(-15)"/>
    <ellipse cx="8" cy="4" rx="5" ry="10" fill="url(#softPink)" opacity="0.6" transform="rotate(60)"/>
    <ellipse cx="-6" cy="6" rx="5" ry="10" fill="url(#softPink)" opacity="0.5" transform="rotate(135)"/>
    <circle cx="2" cy="0" r="2.5" fill="#fbbf24"/>
  </g>
</svg>