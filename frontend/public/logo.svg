<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Subtle gradient for the circle border -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a3a5c"/>
      <stop offset="50%" stop-color="#6b4a7a"/>
      <stop offset="100%" stop-color="#4a3a5c"/>
    </linearGradient>
    
    <!-- Petal gradient - soft pink -->
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Dark circular background -->
  <circle cx="256" cy="256" r="248" fill="#0c0a14"/>
  
  <!-- Thin elegant border -->
  <circle cx="256" cy="256" r="248" fill="none" stroke="url(#borderGrad)" stroke-width="2" opacity="0.6"/>
  
  <!-- Elegant italic M -->
  <g transform="translate(256, 248)">
    <!-- M letterform - italic serif style -->
    <path d="M-95 75 L-95 -65 C-95 -80, -85 -85, -75 -85 L-55 -85 C-45 -85, -40 -78, -40 -70 L-40 -20 L5 -85 L25 -85 L75 -5 L75 -85 L95 -85 L95 75 L75 75 L75 -45 L30 30 L20 30 L-55 -45 L-55 75 Z" 
          fill="#e8e4ef" 
          fill-rule="evenodd"
          transform="skewX(-8)"/>
  </g>

  <!-- Cherry blossom flower - positioned to the right of M -->
  <g transform="translate(330, 215)">
    <!-- 5 petals - organic shapes -->
    <path d="M0,-22 C5,-18 8,-10 7,-4 C6,2 3,6 0,8 C-3,6 -6,2 -7,-4 C-8,-10 -5,-18 0,-22" 
          fill="url(#petalGrad)" opacity="0.85"/>
    <path d="M0,-22 C5,-18 8,-10 7,-4 C6,2 3,6 0,8 C-3,6 -6,2 -7,-4 C-8,-10 -5,-18 0,-22" 
          fill="url(#petalGrad)" opacity="0.8" transform="rotate(72)"/>
    <path d="M0,-22 C5,-18 8,-10 7,-4 C6,2 3,6 0,8 C-3,6 -6,2 -7,-4 C-8,-10 -5,-18 0,-22" 
          fill="url(#petalGrad)" opacity="0.75" transform="rotate(144)"/>
    <path d="M0,-22 C5,-18 8,-10 7,-4 C6,2 3,6 0,8 C-3,6 -6,2 -7,-4 C-8,-10 -5,-18 0,-22" 
          fill="url(#petalGrad)" opacity="0.75" transform="rotate(216)"/>
    <path d="M0,-22 C5,-18 8,-10 7,-4 C6,2 3,6 0,8 C-3,6 -6,2 -7,-4 C-8,-10 -5,-18 0,-22" 
          fill="url(#petalGrad)" opacity="0.7" transform="rotate(288)"/>
    
    <!-- Center dots -->
    <circle cx="0" cy="0" r="4" fill="#fbbf24"/>
    <circle cx="-1.5" cy="-1.5" r="1.5" fill="#f59e0b"/>
  </g>
  
  <!-- Small accent dot -->
  <circle cx="305" cy="195" r="2" fill="#f9a8d4" opacity="0.5"/>
</svg>