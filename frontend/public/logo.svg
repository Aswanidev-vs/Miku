<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Refined gradient - softer, more natural -->
    <linearGradient id="mFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="40%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    
    <!-- Petal gradients - cherry blossom realism -->
    <linearGradient id="petalSoft" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </linearGradient>
    
    <linearGradient id="petalDeep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbcfe8"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    
    <!-- Background - deep night sky -->
    <radialGradient id="nightSky" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2e1065"/>
      <stop offset="100%" stop-color="#0f0524"/>
    </radialGradient>
    
    <!-- Soft glow for the M -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Subtle inner shadow -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="3"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feComposite operator="over" in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="88" fill="url(#nightSky)"/>
  
  <!-- Subtle texture overlay for depth -->
  <rect width="512" height="512" rx="88" fill="url(#nightSky)" opacity="0.8"/>
  
  <!-- Distant stars - subtle ambiance -->
  <g opacity="0.15" fill="#e9d5ff">
    <circle cx="45" cy="45" r="1.5"/>
    <circle cx="480" cy="80" r="1"/>
    <circle cx="70" cy="450" r="1.2"/>
    <circle cx="460" cy="420" r="0.8"/>
    <circle cx="150" cy="60" r="1"/>
    <circle cx="380" cy="50" r="1.3"/>
    <circle cx="50" cy="200" r="0.9"/>
    <circle cx="470" cy="280" r="1.1"/>
  </g>

  <!-- Main M letterform - custom, hand-drawn feel with varying stroke -->
  <g filter="url(#softGlow)">
    <!-- Left stem - slight curve for organic feel -->
    <path d="M128 385 C128 385, 126 200, 128 165 C130 145, 142 140, 158 140" 
          fill="none" stroke="url(#mFill)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Left diagonal - natural angle -->
    <path d="M145 158 L195 265" 
          fill="none" stroke="url(#mFill)" stroke-width="34" stroke-linecap="round"/>
    
    <!-- Right diagonal - mirrored but slightly different for asymmetry -->
    <path d="M215 265 L265 158" 
          fill="none" stroke="url(#mFill)" stroke-width="34" stroke-linecap="round"/>
    
    <!-- Right stem -->
    <path d="M252 140 L268 140 C285 140, 290 148, 290 165 C292 200, 290 385, 290 385" 
          fill="none" stroke="url(#mFill)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Cherry blossom cluster - main flower -->
  <g transform="translate(380, 105)">
    <!-- Stem connecting to branch -->
    <path d="M0 25 Q-15 45 -25 70" fill="none" stroke="#6d28d9" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
    
    <!-- Petals - organic, slightly irregular shapes -->
    <g transform="rotate(-8)">
      <path d="M0,-32 C8,-28 14,-18 12,-8 C10,2 4,8 0,10 C-4,8 -10,2 -12,-8 C-14,-18 -8,-28 0,-32" 
            fill="url(#petalSoft)" opacity="0.95"/>
      <path d="M0,-32 C8,-28 14,-18 12,-8 C10,2 4,8 0,10 C-4,8 -10,2 -12,-8 C-14,-18 -8,-28 0,-32" 
            fill="url(#petalSoft)" opacity="0.9" transform="rotate(72)"/>
      <path d="M0,-32 C8,-28 14,-18 12,-8 C10,2 4,8 0,10 C-4,8 -10,2 -12,-8 C-14,-18 -8,-28 0,-32" 
            fill="url(#petalSoft)" opacity="0.85" transform="rotate(144)"/>
      <path d="M0,-32 C8,-28 14,-18 12,-8 C10,2 4,8 0,10 C-4,8 -10,2 -12,-8 C-14,-18 -8,-28 0,-32" 
            fill="url(#petalSoft)" opacity="0.85" transform="rotate(216)"/>
      <path d="M0,-32 C8,-28 14,-18 12,-8 C10,2 4,8 0,10 C-4,8 -10,2 -12,-8 C-14,-18 -8,-28 0,-32" 
            fill="url(#petalSoft)" opacity="0.8" transform="rotate(288)"/>
    </g>
    
    <!-- Center pistil -->
    <circle cx="0" cy="0" r="7" fill="#fbbf24"/>
    <circle cx="-2" cy="-2" r="3" fill="#f59e0b"/>
    <circle cx="2" cy="2" r="2" fill="#d97706" opacity="0.6"/>
  </g>

  <!-- Secondary flower - smaller, softer -->
  <g transform="translate(85, 85) scale(0.55)" opacity="0.7">
    <g transform="rotate(15)">
      <path d="M0,-32 C8,-28 14,-18 12,-8 C10,2 4,8 0,10 C-4,8 -10,2 -12,-8 C-14,-18 -8,-28 0,-32" 
            fill="url(#petalDeep)" opacity="0.9"/>
      <path d="M0,-32 C8,-28 14,-18 12,-8 C10,2 4,8 0,10 C-4,8 -10,2 -12,-8 C-14,-18 -8,-28 0,-32" 
            fill="url(#petalDeep)" opacity="0.85" transform="rotate(72)"/>
      <path d="M0,-32 C8,-28 14,-18 12,-8 C10,2 4,8 0,10 C-4,8 -10,2 -12,-8 C-14,-18 -8,-28 0,-32" 
            fill="url(#petalDeep)" opacity="0.8" transform="rotate(144)"/>
      <path d="M0,-32 C8,-28 14,-18 12,-8 C10,2 4,8 0,10 C-4,8 -10,2 -12,-8 C-14,-18 -8,-28 0,-32" 
            fill="url(#petalDeep)" opacity="0.8" transform="rotate(216)"/>
      <path d="M0,-32 C8,-28 14,-18 12,-8 C10,2 4,8 0,10 C-4,8 -10,2 -12,-8 C-14,-18 -8,-28 0,-32" 
            fill="url(#petalDeep)" opacity="0.75" transform="rotate(288)"/>
    </g>
    <circle cx="0" cy="0" r="6" fill="#fbbf24"/>
    <circle cx="0" cy="0" r="3" fill="#f59e0b"/>
  </g>

  <!-- Floating petals - scattered naturally like falling blossoms -->
  <g opacity="0.5">
    <!-- Large petal - close -->
    <ellipse cx="430" cy="195" rx="9" ry="16" fill="url(#petalSoft)" transform="rotate(30, 430, 195)"/>
    
    <!-- Medium petal -->
    <ellipse cx="75" cy="175" rx="7" ry="12" fill="url(#petalDeep)" transform="rotate(-20, 75, 175)" opacity="0.7"/>
    
    <!-- Small petal - far -->
    <ellipse cx="445" cy="340" rx="6" ry="10" fill="url(#petalSoft)" transform="rotate(50, 445, 340)" opacity="0.4"/>
    
    <!-- Tiny accent petal -->
    <ellipse cx="55" cy="380" rx="4" ry="7" fill="#fbcfe8" transform="rotate(-35, 55, 380)" opacity="0.3"/>
    
    <!-- Distant petal -->
    <ellipse cx="350" cy="420" rx="5" ry="8" fill="url(#petalSoft)" transform="rotate(65, 350, 420)" opacity="0.25"/>
  </g>

  <!-- Thin branch line for organic connection -->
  <path d="M385 130 Q400 160 420 180 Q440 200 460 210" 
        fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

  <!-- App name - clean, modern typography -->
  <text x="208" y="450" 
        font-family="'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="52" 
        font-weight="200" 
        letter-spacing="16"
        fill="#e2e8f0" 
        text-anchor="middle"
        opacity="0.9">MIKU</text>
  
  <!-- Subtle tagline -->
  <text x="208" y="478" 
        font-family="'SF Pro Display', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
        font-size="14" 
        font-weight="300" 
        letter-spacing="4"
        fill="#a78bfa" 
        text-anchor="middle"
        opacity="0.6">ANILIST CLIENT</text>
</svg>